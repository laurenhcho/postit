<svg width="96" height="96" viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
  <!-- Post-it note background with gradient -->
  <defs>
    <linearGradient id="postItGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4db8b0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#59b5e6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Post-it note with rotation -->
  <g transform="rotate(2, 48, 48)">
    <!-- Main post-it -->
    <rect x="8" y="8" width="80" height="80" rx="2" fill="url(#postItGradient)" opacity="1"/>

    <!-- Border -->
    <rect x="8" y="8" width="80" height="80" rx="2" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>

    <!-- Smiley face -->
    <g transform="rotate(-2, 48, 48)">
      <!-- Face circle -->
      <circle cx="48" cy="48" r="28" fill="#000000" opacity="0.9" />

      <!-- Eyes -->
      <circle cx="38" cy="42" r="3.5" fill="#4db8b0" />
      <circle cx="58" cy="42" r="3.5" fill="#4db8b0" />

      <!-- Smile -->
      <path
        d="M 35 52 Q 48 62 61 52"
        stroke="#4db8b0"
        stroke-width="3.5"
        fill="none"
        stroke-linecap="round"
      />
    </g>

    <!-- Shadow/fold effect -->
    <rect x="82" y="82" width="6" height="6" rx="0" fill="#000000" opacity="0.2" />
  </g>
</svg>
